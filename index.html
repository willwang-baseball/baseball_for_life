<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>管理介面 - Will 棒球成長軌跡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #f9f9f9;
    }
    h1 {
      color: #c8102e;
      text-align: center;
    }
    form {
      margin-bottom: 30px;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
    }
    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      background: #0b1d3a;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #c8102e;
    }
    .output {
      margin-top: 20px;
      background: #fff;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    pre {
      background: #eee;
      padding: 10px;
      border-radius: 5px;
      overflow-x: auto;
    }
    .forms-container {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: space-between;
    }
    .form-box {
      flex: 1;
      min-width: 300px;
    }
    @media (max-width: 768px) {
      .forms-container {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <h1>管理介面</h1>

  <div class="forms-container">
    <!-- Timeline 表單 -->
    <div class="form-box">
      <form id="timelineForm">
        <h2>新增 Timeline 事件</h2>
        <label for="year">年份：</label>
        <input type="text" id="year" required>
        <label for="event">事件：</label>
        <input type="text" id="event" required>
        <button type="submit">新增事件</button>
      </form>
    </div>

    <!-- Stats 表單 -->
    <div class="form-box">
      <form id="statsForm">
        <h2>新增 Stats 數據</h2>
        <label for="label">數據名稱：</label>
        <input type="text" id="label" required>
        <label for="value">數值：</label>
        <input type="text" id="value" required>
        <button type="submit">新增數據</button>
      </form>
    </div>
  </div>

  <div class="output">
    <h2>JSON 預覽</h2>
    <h3>Timeline</h3>
    <pre id="timelineOutput">[]</pre>
    <h3>Stats</h3>
    <pre id="statsOutput">[]</pre>
  </div>

  <script>
    let timelineData = [];
    let statsData = [];

    // Timeline 表單處理
    document.getElementById("timelineForm").addEventListener("submit", function(e){
      e.preventDefault();
      const year = document.getElementById("year").value;
      const event = document.getElementById("event").value;
      timelineData.push({year, event});
      document.getElementById("timelineOutput").textContent = JSON.stringify(timelineData, null, 2);
      this.reset();
    });

    // Stats 表單處理
    document.getElementById("statsForm").addEventListener("submit", function(e){
      e.preventDefault();
      const label = document.getElementById("label").value;
      const value = document.getElementById("value").value;
      statsData.push({label, value});
      document.getElementById("statsOutput").textContent = JSON.stringify(statsData, null, 2);
      this.reset();
    });
  </script>
</body>
</html>
